name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  lint:
    name: Lint Python (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 scipy/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --statistics

  test-scipy:
    name: Run SciPy experiments
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libsuitesparse-dev swig
          pip install scipy numpy
          pip install scikit-umfpack || true
          pip install scikit-sparse || true

      - name: Run bench_scipy1.py
        run: python3 scipy/bench_scipy.py

      - name: Run bench_scipy2.py
        run: python3 scipy/bench_scipy3.py
